name: Release

on:
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'

env:
  GO_VERSION: "1.24"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3 #5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          submodules: true

      - name: Get branch for tag
        run: |
          git fetch --all
          BRANCH=$(git branch -r --contains ${{ github.sha }} \
            | grep -v HEAD \
            | sed 's|origin/||' \
            | tr -d ' ' \
            | head -1)
          echo "Branch: $BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Build and Publish
        env:
          BRANCH_NAME: ${{ env.BRANCH }}
          REGISTRY_ORGS: docker.io/exoscale
          XPKG_REG_ORGS: docker.io/exoscale
          VERSION: ${{ github.ref_name }}
        run: |
          make build.all publish
