name: Release

on:
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3 #5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Upbound Registry
        uses: docker/login-action@v3
        with:
          registry: xpkg.upbound.io
          username: ${{ secrets.UPBOUND_ROBOT_USERNAME }}
          password: ${{ secrets.UPBOUND_ROBOT_TOKEN }}

      - name: Install up CLI (>= v0.39.0 for alpha append)
        run: |
          set -euxo pipefail
          # Download installer script (produces local ./up binary)
          curl -sL https://cli.upbound.io | sh
          mkdir -p "$HOME/bin"
          mv up "$HOME/bin/up"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          "$HOME/bin/up" version

      - name: Setup QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Get branch for tag
        run: |
          git fetch --all
          BRANCH=$(git branch -r --contains ${{ github.sha }} \
            | grep -v HEAD \
            | sed 's|origin/||' \
            | tr -d ' ' \
            | head -1)
          echo "Branch: $BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Build and Publish
        env:
          BRANCH_NAME: ${{ env.BRANCH }}
          REGISTRY_ORGS: docker.io/exoscale xpkg.upbound.io/exoscale
          XPKG_REG_ORGS: docker.io/exoscale xpkg.upbound.io/exoscale
          XPKG_REG_ORGS_NO_PROMOTE: xpkg.upbound.io/exoscale
          VERSION: ${{ github.ref_name }}
        run: |
          make build.all publish

      - name: Append Marketplace Extension Assets
        env:
          UPBOUND_ROBOT_TOKEN: ${{ secrets.UPBOUND_ROBOT_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          up login --token $UPBOUND_ROBOT_TOKEN --account exoscale
          up alpha xpkg append --extensions-root=./extensions xpkg.upbound.io/exoscale/provider-exoscale:$VERSION
