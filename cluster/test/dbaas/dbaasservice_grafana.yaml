apiVersion: dbaas.exoscale.m.exoscale.ch/v1alpha1
kind: DBAASService
metadata:
  name: grafana-${data.suffix}
  namespace: default
spec:
  forProvider:
    name: grafana-${data.suffix}
    plan: hobbyist-2
    type: grafana
    zone: ${data.zone}
    terminationProtection: false
    grafana:
      grafanaSettings: |-
        {"allow_embedding":true,"disable_gravatar":true}
  writeConnectionSecretToRef:
    name: grafana-${data.suffix}
