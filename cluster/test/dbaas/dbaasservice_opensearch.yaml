apiVersion: dbaas.exoscale.m.exoscale.ch/v1alpha1
kind: DBAASService
metadata:
  name: my-opensearch
  namespace: default
spec:
  forProvider:
    name: my-opensearch
    maintenanceDow: sunday
    maintenanceTime: 15:00:00
    terminationProtection: false
    opensearch:
      ipFilter:
        - "0.0.0.0/0"
    plan: hobbyist-2
    type: opensearch
    zone: ch-gva-2
  writeConnectionSecretToRef:
    name: my-opensearch
