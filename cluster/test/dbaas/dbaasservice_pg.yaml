apiVersion: dbaas.exoscale.m.exoscale.ch/v1alpha1
kind: DBAASService
metadata:
  name: postgres-${data.suffix}
  namespace: default
spec:
  forProvider:
    name: postgres-${data.suffix}
    maintenanceDow: sunday
    maintenanceTime: 15:00:00
    terminationProtection: false
    pg:
      adminPasswordSecretRef:
        name: pg-password-${data.suffix}
        key: password
      adminUsername: admin
      version: "18"
    plan: hobbyist-2
    type: pg
    zone: ${data.zone}
  writeConnectionSecretToRef:
    name: postgres-${data.suffix}

---
apiVersion: v1
kind: Secret
metadata:
  name: pg-password-${data.suffix}
  namespace: default
type: Opaque
data:
  password: MWYyZDFlMmU2N2Rm
