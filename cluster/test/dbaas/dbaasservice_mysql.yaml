apiVersion: dbaas.exoscale.m.exoscale.ch/v1alpha1
kind: DBAASService
metadata:
  name: mysql-${data.suffix}
  namespace: default
spec:
  forProvider:
    name: mysql-${data.suffix}
    maintenanceDow: sunday
    maintenanceTime: 15:00:00
    terminationProtection: false
    mysql:
      adminPasswordSecretRef:
        name: mysql-password-${data.suffix}
        key: password
      adminUsername: admin
      version: "8"
    plan: hobbyist-2
    type: mysql
    zone: ${data.zone}
  writeConnectionSecretToRef:
    name: mysql-${data.suffix}

---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-password-${data.suffix}
  namespace: default
type: Opaque
data:
  password: MWYyZDFlMmU2N2Rm
