apiVersion: dbaas.exoscale.m.exoscale.ch/v1alpha1
kind: DBAASService
metadata:
  name: my-kafka
  namespace: default
spec:
  forProvider:
    name: my-kafka
    plan: business-4
    type: kafka
    zone: ch-gva-2
    terminationProtection: false
    kafka:
      version: "4.0"
  writeConnectionSecretToRef:
    name: my-kafka
