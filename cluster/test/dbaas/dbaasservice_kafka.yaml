apiVersion: dbaas.exoscale.m.exoscale.ch/v1alpha1
kind: DBAASService
metadata:
  name: kafka-${data.suffix}
  namespace: default
spec:
  forProvider:
    name: kafka-${data.suffix}
    plan: business-4
    type: kafka
    zone: ${data.zone}
    terminationProtection: false
    kafka:
      version: "4.0"
  writeConnectionSecretToRef:
    name: kafka-${data.suffix}
