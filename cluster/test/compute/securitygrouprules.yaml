apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: SecurityGroup
metadata:
  name: security-group-${data.suffix}
  namespace: default
spec:
  forProvider:
    name: security-group-${data.suffix}

---
apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: SecurityGroupRules
metadata:
  name: security-group-rule-${data.suffix}
  namespace: default
spec:
  forProvider:
    cidr: 0.0.0.0/0
    endPort: 22
    protocol: TCP
    securityGroupIdRef:
      name: security-group-${data.suffix}
      namespace: default
    startPort: 22
    type: INGRESS
