apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: Instance
metadata:
  name: instance-${data.suffix}
  namespace: default
spec:
  forProvider:
    diskSize: 10
    name: instance-${data.suffix}
    templateId: 0cd58ee7-333a-4256-aa6e-288e6dad3a08
    type: standard.small
    zone: ${data.zone}
    userData: |
      #cloud-config
      package_upgrade: true
      packages:
        - nginx
      runcmd:
        - systemctl enable nginx
        - systemctl start nginx
        - echo "Hello from Exoscale!" > /var/www/html/index.html
