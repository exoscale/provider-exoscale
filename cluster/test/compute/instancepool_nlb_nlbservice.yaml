apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: InstancePool
metadata:
  labels:
    testing.upbound.io/example-name: instance-pool-${data.suffix}
  annotations:
    uptest.upbound.io/pre-delete-hook: "sleep.sh"
  name: instance-pool-${data.suffix}
  namespace: default
spec:
  forProvider:
    diskSize: 10
    instanceType: standard.small
    name: instance-pool-${data.suffix}
    size: 2
    templateId: 0cd58ee7-333a-4256-aa6e-288e6dad3a08
    zone: ${data.zone}

---
apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: NLBService
metadata:
  name: nlb-service-${data.suffix}
  namespace: default
spec:
  forProvider:
    name: nlb-service-${data.suffix}
    zone: ${data.zone}
    healthcheck:
    - interval: 5
      mode: https
      port: 8443
      retries: 1
      timeout: 3
      tlsSni: example.net
      uri: /healthz
    instancePoolIdSelector:
      matchLabels:
        testing.upbound.io/example-name: instance-pool-${data.suffix}
    nlbIdRef:
      name: nlb-${data.suffix}
      namespace: default
    port: 443
    protocol: tcp
    strategy: round-robin
    targetPort: 8443

---
apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: NLB
metadata:
  annotations:
    uptest.upbound.io/pre-delete-hook: "sleep.sh"
  name: nlb-${data.suffix}
  namespace: default
spec:
  forProvider:
    name: nlb-${data.suffix}
    zone: ${data.zone}
