apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: SKSNodepool
metadata:
  name: sks-nodepool-${data.suffix}
  namespace: default
spec:
  forProvider:
    clusterIdRef:
      name: sks-cluster-${data.suffix}
      namespace: default
    securityGroupIdsSelector:
      matchLabels:
        testing.upbound.io/example-name: sks-security-group-${data.suffix}
    instanceType: standard.medium
    name: sks-nodepool-${data.suffix}
    size: 2
    zone: ${data.zone}

---
apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: SKSCluster
metadata:
  name: sks-cluster-${data.suffix}
  namespace: default
spec:
  forProvider:
    name: sks-cluster-${data.suffix}
    zone: ${data.zone}
    cni: calico

---
apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: SecurityGroup
metadata:
  labels:
    testing.upbound.io/example-name: sks-security-group-${data.suffix}
  name: sks-security-group-${data.suffix}
  namespace: default
spec:
  forProvider:
    name: sks-security-group-${data.suffix}

---
apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: SecurityGroupRules
metadata:
  name: sks-nodeport-services-${data.suffix}
  namespace: default
spec:
  forProvider:
    cidr: 0.0.0.0/0
    endPort: 32767
    startPort: 30000
    type: INGRESS
    protocol: TCP
    securityGroupIdRef:
      name: sks-security-group-${data.suffix}
      namespace: default

---
apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: SecurityGroupRules
metadata:
  name: sks-kubelet-${data.suffix}
  namespace: default
spec:
  forProvider:
    cidr: 0.0.0.0/0
    endPort: 10250
    startPort: 10250
    type: INGRESS
    protocol: TCP
    securityGroupIdRef:
      name: sks-security-group-${data.suffix}
      namespace: default

---
apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: SecurityGroupRules
metadata:
  name: sks-calico-traffic-${data.suffix}
  namespace: default
spec:
  forProvider:
    cidr: 0.0.0.0/0
    endPort: 4789
    startPort: 4789
    type: INGRESS
    protocol: UDP
    securityGroupIdRef:
      name: sks-security-group-${data.suffix}
      namespace: default
