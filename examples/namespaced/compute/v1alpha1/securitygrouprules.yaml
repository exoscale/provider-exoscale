apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: SecurityGroupRules
metadata:
  name: my-security-group-rule
  namespace: crossplane-system
spec:
  forProvider:
    cidr: 0.0.0.0/0
    endPort: 22
    protocol: TCP
    securityGroupIdRef:
      name: security-group-1
      namespace: crossplane-system
    startPort: 22
    type: INGRESS
  providerConfigRef:
    kind: ClusterProviderConfig
    name: default
