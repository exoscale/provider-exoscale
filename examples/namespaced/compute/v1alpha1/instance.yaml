#     endPort: 22
#     protocol: TCP
#     securityGroupIdRef:
#       name: security-group-1
#       namespace: crossplane-system
#     startPort: 22
#     type: INGRESS
#   providerConfigRef:
#     kind: ClusterProviderConfig
#     name: default

---
apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: SecurityGroupRules
metadata:
  name: allow-http
  namespace: crossplane-system
spec:
  forProvider:
    cidr: 0.0.0.0/0
    endPort: 80
    protocol: TCP
    securityGroupIdRef:
      name: security-group-1
      namespace: crossplane-system
    startPort: 80
    type: INGRESS
  providerConfigRef:
    kind: ClusterProviderConfig
    name: default
