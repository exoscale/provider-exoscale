apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: Instance
metadata:
  annotations:
    meta.upbound.io/example-id: compute/v1alpha1/instance
  labels:
    testing.upbound.io/example-name: my_instance
  name: my-instance
  namespace: crossplane-system
spec:
  forProvider:
    diskSize: 10
    name: my-instance
    templateId: 0cd58ee7-333a-4256-aa6e-288e6dad3a08
    type: standard.small
    zone: ch-gva-2
    ## uncomment if you want to add your ssh-key
    # sshKeysSelector:
    #   matchLabels:
    #     testing.upbound.io/example-name: my-ssh-key-1
    securityGroupIdsSelector:
      matchLabels:
        testing.upbound.io/example-name: security-group-1
    userData: |
      #cloud-config
      package_upgrade: true
      packages:
        - nginx
      runcmd:
        - systemctl enable nginx
        - systemctl start nginx
        - echo "Hello from Exoscale!" > /var/www/html/index.html
  providerConfigRef:
    kind: ClusterProviderConfig
    name: default

---
## uncomment if you want to add your ssh-key + add your ssh-key
# apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
# kind: SSHKey
# metadata:
#   labels:
#     testing.upbound.io/example-name: my-ssh-key-1
#   name: my-ssh-key-1
#   namespace: crossplane-system
# spec:
#   forProvider:
#     publicKey: "...."
#   providerConfigRef:
#     kind: ClusterProviderConfig
#     name: default

---
apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
kind: SecurityGroup
metadata:
  labels:
    testing.upbound.io/example-name: security-group-1
  name: security-group-1
  namespace: crossplane-system
spec:
  forProvider:
    name: security-group-1

---
## uncomment if you want to ssh into your instance
# apiVersion: compute.exoscale.m.exoscale.ch/v1alpha1
# kind: SecurityGroupRules
# metadata:
#   name: allow-ssh
#   namespace: crossplane-system
# spec:
