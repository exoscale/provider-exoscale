apiVersion: iam.exoscale.m.exoscale.ch/v1alpha1
kind: IAMAPIKey
metadata:
  annotations:
    meta.upbound.io/example-id: iam/v1alpha1/iamapikey
  labels:
    testing.upbound.io/example-name: my_api_key
  name: my-api-key
  namespace: crossplane-system
spec:
  forProvider:
    name: my-api-key
    roleIdSelector:
      matchLabels:
        testing.upbound.io/example-name: my_role
